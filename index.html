<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom n' Privacy</title>
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1b1e;
            --card-bg: #25262b;
            --text-color: #c1c2c5;
            --header-color: #ffffff;
            --accent-blue: #3b82f6;
            --border-color: #373a40;
            --transition: all 0.3s ease;
        }

        /* Cursor Logic */
        * {
            cursor: default; /* Normal cursor for everything */
            box-sizing: border-box;
        }

        a, summary, button, .interactive {
            cursor: pointer; /* Click cursor for links/dropdowns */
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; /* For fade-in animation */
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 60px 0;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            color: var(--header-color);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .btn-github {
            background-color: var(--accent-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: var(--transition);
        }

        .btn-github:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* Markdown Content Styling */
        #readme-content {
            margin-top: 40px;
        }

        details {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: var(--transition);
        }

        details[open] {
            border-color: var(--accent-blue);
        }

        summary {
            padding: 20px;
            font-weight: bold;
            color: var(--header-color);
            list-style: none;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        summary:hover {
            background: #2c2e33;
        }

        summary::before {
            content: '▶';
            font-size: 0.7em;
            margin-right: 15px;
            transition: transform 0.2s;
        }

        details[open] summary::before {
            transform: rotate(90deg);
            color: var(--accent-blue);
        }

        .content-inner {
            padding: 0 20px 20px 50px;
            border-top: 1px solid var(--border-color);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ul { padding-left: 20px; }
        li { margin: 10px 0; }
        a { color: var(--accent-blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Footer */
        footer {
            margin-top: 100px;
            padding: 40px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.8rem;
            width: 100%;
        }

        .unlicense {
            opacity: 0.6;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero">
            <h1>Freedom n' Privacy</h1>
            <p>
                A curated collection of recommended tools and software 
                that respect <b>YOUR</b> freedom and privacy. No tracking, no BS.
            </p>
            <a href="https://github.com/k4sprl/Freedom-n-Privacy" class="btn-github">View on GitHub</a>
        </section>

        <div id="readme-content">
            <p>Fetching encrypted data...</p>
        </div>
    </div>

    <footer>
        <div class="unlicense">This project is released under the <b>Unlicense</b> (Public Domain).</div>
        <div>Open Source & Community Driven</div>
    </footer>

    <script>
        // Use a slightly delayed fetch to deter very basic scraper bots
        setTimeout(async () => {
            const rawUrl = "https://raw.githubusercontent.com/k4sprl/Freedom-n-Privacy/main/README.md";
            const contentDiv = document.getElementById('readme-content');

            try {
                const response = await fetch(rawUrl);
                const markdown = await response.text();
                
                // Remove the title/intro from the README since we have a custom Hero section
                // This assumes your README starts with # Freedom n' Privacy
                const cleanMarkdown = markdown.replace(/^# Freedom n' Privacy[\s\S]*?(?=<details>)/i, '');

                contentDiv.innerHTML = marked.parse(cleanMarkdown);

                // Wrap the content of each detail for animation purposes
                document.querySelectorAll('details').forEach(detail => {
                    const nodes = Array.from(detail.childNodes).filter(n => n.nodeName !== 'SUMMARY');
                    const wrapper = document.createElement('div');
                    wrapper.className = 'content-inner';
                    nodes.forEach(n => wrapper.appendChild(n));
                    detail.appendChild(wrapper);
                });

            } catch (error) {
                contentDiv.innerHTML = "<p>Failed to load tools. Check your connection.</p>";
            }
        }, 300);
    </script>
</body>
</html>
