<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom n' Privacy</title>
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='monospace' font-weight='bold' fill='%233b82f6'>F</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1b1e;
            --card-bg: #25262b;
            --text-color: #c1c2c5;
            --header-color: #ffffff;
            --accent-blue: #3b82f6;
            --border-color: #373a40;
            --transition: all 0.2s ease;
        }

        /* Cursor Logic */
        * { cursor: default; box-sizing: border-box; }
        a, summary, button, input, .btn-github { cursor: pointer; }
        input:focus { cursor: text; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .container { max-width: 900px; width: 90%; padding: 60px 0; }

        /* Hero & Search */
        h1 { font-size: 3rem; color: var(--header-color); margin-bottom: 10px; letter-spacing: -1px; }
        
        .search-container {
            margin: 30px 0;
            position: relative;
        }

        #searchBar {
            width: 100%;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        #searchBar:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        .btn-github {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-block;
            margin-top: 10px;
        }

        .btn-github:hover { background: var(--border-color); color: white; }

        /* Content Area */
        #readme-content { margin-top: 20px; min-height: 300px; }

        /* Terminal Loader Styles */
        .terminal-loader {
            background: #111;
            padding: 25px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-color);
        }
        
        .terminal-loader p { margin: 8px 0; font-size: 0.95rem; }
        .term-accent { color: var(--accent-blue); font-weight: bold; margin-right: 8px; }
        .blink { animation: blink 1s step-end infinite; color: var(--header-color); }
        @keyframes blink { 50% { opacity: 0; } }

        details {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: opacity 0.3s ease;
        }

        summary {
            padding: 18px;
            font-weight: bold;
            color: var(--header-color);
            list-style: none;
            display: flex;
            align-items: center;
        }

        summary:hover { background: #2c2e33; }

        summary::before {
            content: '▶';
            font-size: 0.7em;
            margin-right: 15px;
            transition: transform 0.2s;
        }

        details[open] summary::before { transform: rotate(90deg); color: var(--accent-blue); }

        .content-inner {
            padding: 0 20px 20px 50px;
            border-top: 1px solid var(--border-color);
        }

        a { color: var(--accent-blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        footer {
            margin-top: 60px;
            padding: 40px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.75rem;
            width: 100%;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Freedom n' Privacy</h1>
            <p>Curated tools that respect <b>YOUR</b> digital rights.</p>
            <a href="https://github.com/k4sprl/Freedom-n-Privacy" class="btn-github" target="_blank" rel="noopener noreferrer">GitHub Repository</a>
        </header>

        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search for tools (e.g. 'VPN', 'Browser', 'Mullvad')..." onkeyup="filterContent()">
        </div>

        <div id="readme-content">
            <div class="terminal-loader">
                <p><span class="term-accent">></span> establishing connection...</p>
                <p><span class="term-accent">></span> fetching repository payload...</p>
                <p><span class="term-accent">></span> parsing markdown<span class="blink">_</span></p>
            </div>
        </div>
    </div>

    <footer>
        <p>Released under the <a href="https://unlicense.org/" target="_blank" rel="noopener noreferrer"><b>Unlicense</b></a> | Open Source Project</p>
    </footer>

    <script>
        // Load Readme
        async function loadContent() {
            const rawUrl = "https://raw.githubusercontent.com/k4sprl/Freedom-n-Privacy/main/README.md";
            try {
                const response = await fetch(rawUrl);
                const markdown = await response.text();
                // Filter out the main header from the README to avoid duplicates
                const cleanMarkdown = markdown.replace(/^# Freedom n' Privacy[\s\S]*?(?=<details>)/i, '');
                
                document.getElementById('readme-content').innerHTML = marked.parse(cleanMarkdown);

                // Add the content-inner wrapper to all details for styling
                document.querySelectorAll('details').forEach(detail => {
                    const nodes = Array.from(detail.childNodes).filter(n => n.nodeName !== 'SUMMARY');
                    const wrapper = document.createElement('div');
                    wrapper.className = 'content-inner';
                    nodes.forEach(n => wrapper.appendChild(n));
                    detail.appendChild(wrapper);
                });
            } catch (e) {
                document.getElementById('readme-content').innerHTML = `
                    <div class="terminal-loader">
                        <p style="color: #ff6b6b;"><span class="term-accent">></span> ERROR: Failed to load tools payload.</p>
                        <p><span class="term-accent">></span> check network connection<span class="blink">_</span></p>
                    </div>
                `;
            }
        }

        // Improved Search Functionality
        function filterContent() {
            const searchInput = document.getElementById('searchBar').value;
            const query = searchInput.toLowerCase().trim();
            const terms = query.split(/\s+/); // Splits query by spaces to allow multi-word searching
            const categories = document.querySelectorAll('details');

            categories.forEach(cat => {
                // Feature #1: Reset completely when search is empty
                if (query === "") {
                    cat.style.display = "block";
                    cat.open = false; 
                    return;
                }

                const text = cat.innerText.toLowerCase();
                
                // Feature #2: Check if ALL words typed are found inside the category
                const matches = terms.every(term => text.includes(term));

                if (matches) {
                    cat.style.display = "block";
                    cat.open = true; // Auto-open when matched
                } else {
                    cat.style.display = "none";
                }
            });
        }

        window.onload = loadContent;
    </script>
</body>
</html>
